version: "3.9"

services:
  db:
    image: postgres:16
    container_name: tjv-postgres
    environment:
      POSTGRES_DB: tjv
      POSTGRES_USER: tjv
      POSTGRES_PASSWORD: tjv
      TZ: Europe/Prague
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tjv -d tjv"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
  app:
    build: .
    container_name: tjv-app
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/tjv"
      SPRING_DATASOURCE_USERNAME: "tjv"
      SPRING_DATASOURCE_PASSWORD: "tjv"
      TZ: Europe/Prague
    ports:
      - "8082:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
